<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audi's Vault</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    /* ✨ FUN ANIMATED BACKGROUND (Dark Mode Edition) */
    body {
      background: linear-gradient(-45deg, #2b1055, #110022, #0a192f, #1a0b2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🛸 GLOWING TOP ACCENT BAR */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #bb86fc, #03dac6, #ff79c6);
      z-index: 999;
    }

    /* 🎨 STATIC SKETCH DOODLE WALLPAPER CONTAINER */
    .doodle-grid {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 998;
      pointer-events: none;
      user-select: none;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 20px;
      padding: 40px;
      box-sizing: border-box;
    }

    /* Styling for the fine-ink sketch items matching the reference images */
    .doodle-grid i {
      font-size: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      -webkit-text-stroke: 2px rgba(42, 42, 53, 0.75); 
      filter: drop-shadow(1px 1px 1px rgba(255, 255, 255, 0.05)); 
    }

    /* 🎀 MAXIMUM CUTE SIDEBAR CONFIGURATION */
    .sidebar { 
      background-color: rgba(25, 15, 40, 0.65) !important; 
      backdrop-filter: blur(20px); 
      border-right: 2px dashed rgba(187, 134, 252, 0.3) !important; 
      font-family: 'Architects Daughter', cursive, sans-serif !important; 
    }

    .sidebar .app-name {
      font-size: 1.3rem !important;
      font-weight: bold;
      font-family: 'Architects Daughter', cursive, sans-serif !important;
      background: linear-gradient(45deg, #bb86fc, #ff79c6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      padding: 10px;
      text-align: center;
    }
    
    /* 🧼 UPGRADED: FROSTED FLOATING NOTE CARD VIEW */
    .markdown-section { 
      background-color: rgba(25, 25, 25, 0.85); 
      padding: 40px !important; 
      border-radius: 24px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
      max-width: 900px;
      margin-top: 40px;
      border: 2px dashed rgba(187, 134, 252, 0.25); /* Dashed frosted card outline */
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .markdown-section:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(187, 134, 252, 0.2);
      border-color: rgba(255, 121, 198, 0.4); /* Glows pink on card hover! */
    }

    /* 🌸 HIGHLIGHT TEXT UPGRADE: Pastel Neon Headings */
    .markdown-section h1, 
    .markdown-section h2, 
    .markdown-section h3, 
    .markdown-section h4 {
      font-family: 'Architects Daughter', cursive, sans-serif !important;
      color: #ff79c6 !important; /* Soft Pastel Pink Highlighter color */
      text-shadow: 0 0 8px rgba(255, 121, 198, 0.3);
      font-weight: bold !important;
    }

    /* 💜 CUSTOM BULLET POINT ICONS FOR MARGIN LISTS */
    .markdown-section ul {
      list-style: none !important; /* Disables boring browser dots */
      padding-left: 20px !important;
    }
    .markdown-section ul li::before {
      content: "💜" !important; /* Handdrawn purple heart bullets! */
      font-size: 12px;
      margin-right: 10px;
      display: inline-block;
      vertical-align: middle;
    }

    /* 🍦 CUTE PUFF-CLOUD LINKS */
    .sidebar-nav li a {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
      border-radius: 12px; 
      padding: 8px 12px !important;
      margin: 4px 10px;
      color: #e2e8f0 !important;
    }

    .sidebar-nav li a:hover {
      background: rgba(187, 134, 252, 0.25) !important;
      color: #ffffff !important;
      padding-left: 20px !important;
      box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);
    }

    .sidebar-nav li.active > a {
      background: linear-gradient(90deg, rgba(187, 134, 252, 0.3), rgba(255, 121, 198, 0.1)) !important;
      color: #ff79c6 !important;
      font-weight: bold;
      border-left: 4px solid #ff79c6 !important;
    }

    .sidebar-nav .app-sub-sidebar li::before {
      content: "🌸" !important;
      font-size: 10px;
      margin-right: 5px;
    }

    /* 👾 CUSTOM NEON SCROLLBAR */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(10, 10, 20, 0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(187, 134, 252, 0.4); border-radius: 10px; }
  </style>
</head>
<body>
  
  <div class="doodle-grid">
    <i class="fa-solid fa-scroll"></i>       <i class="fa-solid fa-laptop"></i>       <i class="fa-solid fa-mug-hot"></i>
    <i class="fa-solid fa-microchip"></i>    <i class="fa-solid fa-scissors"></i>     <i class="fa-solid fa-glass-water"></i>
    
    <i class="fa-solid fa-whiskey-glass"></i> <i class="fa-solid fa-terminal"></i>     <i class="fa-solid fa-circle-nodes"></i>
    <i class="fa-solid fa-cubes"></i>        <i class="fa-solid fa-lines-leaning"></i> <i class="fa-solid fa-mug-saucer"></i>
    
    <i class="fa-solid fa-desktop"></i>      <i class="fa-solid fa-seedling"></i>      <i class="fa-solid fa-keyboard"></i>
    <i class="fa-solid fa-wind"></i>         <i class="fa-solid fa-server"></i>        <i class="fa-solid fa-cloud"></i>

    <i class="fa-solid fa-ice-cream"></i>    <i class="fa-solid fa-database"></i>      <i class="fa-solid fa-heart"></i>
    <i class="fa-solid fa-code"></i>         <i class="fa-solid fa-wrench"></i>        <i class="fa-solid fa-network-wired"></i>
  </div>

  <div id="app"></div>
  
  <script>
    window.$docsify = {
      name: '🛡️ Audi\'s InfoSec Command Center',
      themeColor: '#bb86fc', 
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

</body>
</html>
