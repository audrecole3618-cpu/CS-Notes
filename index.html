<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audi's Vault</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* ✨ FUN ANIMATED BACKGROUND (Dark Mode Edition) */
    body {
      background: linear-gradient(-45deg, #2b1055, #110022, #0a192f, #1a0b2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    /* 🧶 THE HOLY TRINITY DOODLES: Crochet, Iced Coffee, Computers */
    body::before {
      content: "🧶  💻  🧋  ⌨️  🧶  🥤  🖥️  🧶  ☕  💻  🧊  🖱️"; 
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1; 
      font-size: 70px;
      line-height: 2.5;
      opacity: 0.15; 
      text-align: center;
      word-wrap: break-word;
      pointer-events: none;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🧼 CLEANUP: Frosted glass effect so the dark theme pops over the doodles */
    .sidebar { 
      background-color: rgba(20, 20, 20, 0.6) !important; 
      backdrop-filter: blur(10px); 
    }
    .markdown-section { 
      background-color: rgba(30, 30, 30, 0.75); 
      padding: 40px !important; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      max-width: 900px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🛡️ Audi\'s InfoSec Command Center',
      themeColor: '#bb86fc', // A cool neon purple/lavender
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
